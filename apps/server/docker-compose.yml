services:
  postgres:
    image: postgres:16-alpine
    ports:
      - '127.0.0.1:5434:5432'
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-nookbox}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-nookbox}
      POSTGRES_DB: ${POSTGRES_DB:-nookbox}
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test:
        [
          'CMD-SHELL',
          'pg_isready -U ${POSTGRES_USER:-nookbox} -d ${POSTGRES_DB:-nookbox}',
        ]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  postgres-data:
